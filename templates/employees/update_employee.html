{% extends "base.html" %}

{% block title %}Update Employee | Steady Work{% endblock %}

{% block content %}
  <div id="main-container">
    <div id="add-customer-panel">
      <h1>Update Employee</h1>

      <nav id="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ url_for('employees.employees') }}">Employees</a></li>
          <li><a href="{{ url_for('employees.view_employee', employeeId=employeeId) }}">View Employee</a></li>
          <li aria-current="page">Update Employee</li>
        </ol>
      </nav>

      {% if error %}
        <p class="form-field-error">{{ error }}</p>
      {% endif %}

      <form id="add-customer-form" action="{{ url_for('employees.update_employee', employeeId=employeeId) }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-first-name">First Name</label>
            <input id="employee-first-name" name="first_name" type="text" placeholder="First name" value="{{ employee.first_name|default('') }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-last-name">Last Name</label>
            <input id="employee-last-name" name="last_name" type="text" placeholder="Last name" value="{{ employee.last_name|default('') }}" required />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-username">Username</label>
            <input id="employee-username" name="username" type="text" placeholder="Username for login" value="{{ employee.username|default('') }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-password">New Password</label>
            <input id="employee-password" name="password" type="password" placeholder="Leave blank to keep current password" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-phone">Phone</label>
            <input id="employee-phone" name="phone" type="tel" placeholder="(555) 555-5555" value="{{ employee.phone|default('') }}" />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-email">Email</label>
            <input id="employee-email" name="email" type="email" placeholder="name@example.com" value="{{ employee.email|default('') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-position">Position</label>
            <select id="employee-position" name="position">
              <option value="">-- Select a position --</option>
              <option value="Technician" {% if employee.position|default('') == 'Technician' %}selected{% endif %}>Technician</option>
              <option value="Clerk" {% if employee.position|default('') == 'Clerk' %}selected{% endif %}>Clerk</option>
              <option value="Other" {% if employee.position|default('') == 'Other' %}selected{% endif %}>Other</option>
            </select>
          </div>

          <div class="add-customer-form-field">
            <label for="employee-status">Status</label>
            <select id="employee-status" name="status">
              <option value="Active" {% if employee.status|default('Active')|lower == 'active' %}selected{% endif %}>Active</option>
              <option value="Onboarding" {% if employee.status|default('')|lower == 'onboarding' %}selected{% endif %}>Onboarding</option>
            </select>
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-bio">Bio</label>
            <textarea id="employee-bio" name="bio" rows="4" placeholder="Short employee profile bio">{{ employee.bio|default('') }}</textarea>
          </div>

          <div class="add-customer-form-field"></div>
        </div>

        <div id="add-customer-form-actions">
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
