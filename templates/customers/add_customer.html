{% extends "base.html" %}

{% block title %}Add Customer | Steady Work{% endblock %}

{% block content %}
  <div id="main-container">
    <div id="add-customer-panel">
      <h1>Add Customer</h1>

      <nav id="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ url_for('customers.customers') }}">Customers</a></li>
          <li aria-current="page">Add Customer</li>
        </ol>
      </nav>

      {% if error %}
        <p class="form-field-error">{{ error }}</p>
      {% endif %}

      <form id="add-customer-form" action="{{ url_for('customers.add_customer') }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="customer-first-name">First Name</label>
            <input id="customer-first-name" name="first_name" type="text" placeholder="First name" />
          </div>

          <div class="add-customer-form-field">
            <label for="customer-last-name">Last Name</label>
            <input id="customer-last-name" name="last_name" type="text" placeholder="Last name" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="customer-company">Company</label>
            <input id="customer-company" name="company" type="text" placeholder="Company name" />
          </div>

          <div class="add-customer-form-field">
            <label for="customer-phone">Phone</label>
            <input id="customer-phone" name="phone" type="tel" placeholder="(555) 555-5555" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="customer-email">Email</label>
            <input id="customer-email" name="email" type="email" placeholder="name@example.com" />
          </div>

          <div class="add-customer-form-field">
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="customer-address-line-1">Address Line 1</label>
            <input id="customer-address-line-1" name="address_line_1" type="text" placeholder="123 Main Street" />
          </div>

          <div class="add-customer-form-field">
            <label for="customer-address-line-2">Address Line 2</label>
            <input id="customer-address-line-2" name="address_line_2" type="text" placeholder="Suite, unit, or apartment" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="customer-city">City</label>
            <input id="customer-city" name="city" type="text" placeholder="City" />
          </div>

          <div class="add-customer-form-field">
            <label for="customer-state">State</label>
            <select id="customer-state" name="state">
              <option value="">-- Select a state --</option>
              <option value="AL">AL</option>
              <option value="AK">AK</option>
              <option value="AZ">AZ</option>
              <option value="AR">AR</option>
              <option value="CA">CA</option>
              <option value="CO">CO</option>
              <option value="CT">CT</option>
              <option value="DE">DE</option>
              <option value="FL">FL</option>
              <option value="GA">GA</option>
              <option value="HI">HI</option>
              <option value="ID">ID</option>
              <option value="IL">IL</option>
              <option value="IN">IN</option>
              <option value="IA">IA</option>
              <option value="KS">KS</option>
              <option value="KY">KY</option>
              <option value="LA">LA</option>
              <option value="ME">ME</option>
              <option value="MD">MD</option>
              <option value="MA">MA</option>
              <option value="MI">MI</option>
              <option value="MN">MN</option>
              <option value="MS">MS</option>
              <option value="MO">MO</option>
              <option value="MT">MT</option>
              <option value="NE">NE</option>
              <option value="NV">NV</option>
              <option value="NH">NH</option>
              <option value="NJ">NJ</option>
              <option value="NM">NM</option>
              <option value="NY">NY</option>
              <option value="NC">NC</option>
              <option value="ND">ND</option>
              <option value="OH">OH</option>
              <option value="OK">OK</option>
              <option value="OR">OR</option>
              <option value="PA">PA</option>
              <option value="RI">RI</option>
              <option value="SC">SC</option>
              <option value="SD">SD</option>
              <option value="TN">TN</option>
              <option value="TX">TX</option>
              <option value="UT">UT</option>
              <option value="VT">VT</option>
              <option value="VA">VA</option>
              <option value="WA">WA</option>
              <option value="WV">WV</option>
              <option value="WI">WI</option>
              <option value="WY">WY</option>
            </select>
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="customer-referral-source">Referral Source</label>
            <input id="customer-referral-source" name="referral_source" type="text" placeholder="Google, referral, yard sign, etc." />
          </div>

          <div class="add-customer-form-field"></div>
        </div>

        <div id="add-customer-form-actions">
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/create_customer.js') }}" defer></script>
{% endblock %}
