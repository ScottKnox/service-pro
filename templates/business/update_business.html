{% extends "base.html" %}

{% block title %}Update Business | Klovent{% endblock %}

{% block content %}
  <div id="main-container">
    <div id="create-job-panel">
      <h1>Update Business</h1>

      <nav id="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ url_for('home') }}">Home</a></li>
          <li><a href="{{ url_for('admin_bp.admin') }}">Admin</a></li>
          <li><a href="{{ url_for('business.business_profile') }}">Business Profile</a></li>
          <li aria-current="page">Update Business</li>
        </ol>
      </nav>

      <form id="business-profile-form" action="{{ url_for('business.update_business') }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2 class="create-job-form-section-header">Business Information</h2>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="company-name">Company Name</label>
            <input id="company-name" name="company_name" type="text" value="{{ business.get('company_name', '') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="business-warranty-info">Warranty Info</label>
            <textarea id="business-warranty-info" name="warranty_info" rows="4" placeholder="Enter your warranty details...">{{ business.get('warranty_info', '') }}</textarea>
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="business-address-line-1">Address Line 1</label>
            <input id="business-address-line-1" name="address_line_1" type="text" value="{{ business.get('address_line_1', '') }}" />
          </div>
          <div class="add-customer-form-field">
            <label for="business-address-line-2">Address Line 2</label>
            <input id="business-address-line-2" name="address_line_2" type="text" value="{{ business.get('address_line_2', '') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="business-city">City</label>
            <input id="business-city" name="city" type="text" value="{{ business.get('city', '') }}" />
          </div>
          <div class="add-customer-form-field">
            <label for="business-state">State</label>
            <input id="business-state" name="state" type="text" maxlength="2" value="{{ business.get('state', '') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="business-zip-code">Zip Code</label>
            <input id="business-zip-code" name="zip_code" type="text" value="{{ business.get('zip_code', '') }}" />
          </div>
          <div class="add-customer-form-field">
            <label for="business-license-number">License Number</label>
            <input id="business-license-number" name="license_number" type="text" value="{{ business.get('license_number', '') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="business-phone-number">Phone Number</label>
            <input id="business-phone-number" name="phone_number" type="text" value="{{ business.get('phone_number', '') }}" />
          </div>
          <div class="add-customer-form-field">
            <label for="business-fax-number">Fax Number</label>
            <input id="business-fax-number" name="fax_number" type="text" value="{{ business.get('fax_number', '') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="business-email">Email</label>
            <input id="business-email" name="email" type="email" value="{{ business.get('email', '') }}" />
          </div>
          <div class="add-customer-form-field">
            <label for="business-website">Website</label>
            <input id="business-website" name="website" type="text" value="{{ business.get('website', '') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="default-estimate-expiration-days">Default Estimate Expiration Days</label>
            <input id="default-estimate-expiration-days" name="default_estimate_expiration_days" type="number" min="1" step="1" value="{{ business.get('default_estimate_expiration_days', 30) }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="default-payment-due-days">Default Payment Due Days</label>
            <input id="default-payment-due-days" name="default_payment_due_days" type="number" min="1" step="1" value="{{ business.get('default_payment_due_days', 30) }}" />
          </div>
        </div>

        <h2 class="create-job-form-section-header">Tax Configuration</h2>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="tax-parts">Tax Parts?</label>
            <select id="tax-parts" name="tax_parts">
              <option value="no" {% if business.get('tax_parts', 'no') == 'no' %}selected{% endif %}>No</option>
              <option value="yes" {% if business.get('tax_parts', 'no') == 'yes' %}selected{% endif %}>Yes</option>
            </select>
          </div>
          <div class="add-customer-form-field">
            <label for="tax-parts-rate">Tax Parts Rate (%)</label>
            <input id="tax-parts-rate" name="tax_parts_rate" type="number" step="0.01" min="0" value="{{ business.get('tax_parts_rate', business.get('tax_rate', '0')) }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="tax-repair-labor">Tax Repair Labor?</label>
            <select id="tax-repair-labor" name="tax_repair_labor">
              <option value="no" {% if business.get('tax_repair_labor', 'no') == 'no' %}selected{% endif %}>No</option>
              <option value="yes" {% if business.get('tax_repair_labor', 'no') == 'yes' %}selected{% endif %}>Yes</option>
            </select>
          </div>
          <div class="add-customer-form-field">
            <label for="tax-repair-labor-rate">Tax Repair Labor Rate (%)</label>
            <input id="tax-repair-labor-rate" name="tax_repair_labor_rate" type="number" step="0.01" min="0" value="{{ business.get('tax_repair_labor_rate', '0') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="tax-installation">Tax Installation?</label>
            <select id="tax-installation" name="tax_installation">
              <option value="no" {% if business.get('tax_installation', 'no') == 'no' %}selected{% endif %}>No</option>
              <option value="yes" {% if business.get('tax_installation', 'no') == 'yes' %}selected{% endif %}>Yes</option>
            </select>
          </div>
          <div class="add-customer-form-field">
            <label for="tax-installation-rate">Tax Installation Rate (%)</label>
            <input id="tax-installation-rate" name="tax_installation_rate" type="number" step="0.01" min="0" value="{{ business.get('tax_installation_rate', '0') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="tax-fabrication">Tax Fabrication?</label>
            <select id="tax-fabrication" name="tax_fabrication">
              <option value="no" {% if business.get('tax_fabrication', 'no') == 'no' %}selected{% endif %}>No</option>
              <option value="yes" {% if business.get('tax_fabrication', 'no') == 'yes' %}selected{% endif %}>Yes</option>
            </select>
          </div>
          <div class="add-customer-form-field">
            <label for="tax-fabrication-rate">Tax Fabrication Rate (%)</label>
            <input id="tax-fabrication-rate" name="tax_fabrication_rate" type="number" step="0.01" min="0" value="{{ business.get('tax_fabrication_rate', '0') }}" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="tax-materials">Tax Materials?</label>
            <select id="tax-materials" name="tax_materials">
              <option value="no" {% if business.get('tax_materials', 'no') == 'no' %}selected{% endif %}>No</option>
              <option value="yes" {% if business.get('tax_materials', 'no') == 'yes' %}selected{% endif %}>Yes</option>
            </select>
          </div>
          <div class="add-customer-form-field">
            <label for="tax-materials-rate">Tax Materials Rate (%)</label>
            <input id="tax-materials-rate" name="tax_materials_rate" type="number" step="0.01" min="0" value="{{ business.get('tax_materials_rate', '0') }}" />
          </div>
        </div>

        <h2 class="create-job-form-section-header">Email Templates</h2>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="quote-email-template">Quote Email Template</label>
            <textarea id="quote-email-template" name="quote_email_template" rows="8" placeholder="Enter the email template text for quotes...">{{ business.get('quote_email_template', '') }}</textarea>
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="invoice-email-template">Invoice Email Template</label>
            <textarea id="invoice-email-template" name="invoice_email_template" rows="8" placeholder="Enter the email template text for invoices...">{{ business.get('invoice_email_template', '') }}</textarea>
          </div>
        </div>

        <div id="add-customer-form-actions">
          <button type="submit">Save Business Profile</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
