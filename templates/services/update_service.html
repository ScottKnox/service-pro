{% extends "base.html" %}

{% block title %}Update Service | Steady Work{% endblock %}

{% block content %}
  <div id="main-container">
    <div id="create-service-panel">
      <h1>Update Service</h1>

      <nav id="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ url_for('admin_bp.admin') }}">Admin</a></li>
          <li><a href="{{ url_for('catalog.manage_price_book') }}">Manage Price Book</a></li>
          <li><a href="{{ url_for('catalog.manage_services') }}">Manage Services</a></li>
          <li><a href="{{ url_for('catalog.view_service', serviceId=serviceId) }}">View Service</a></li>
          <li aria-current="page">Update Service</li>
        </ol>
      </nav>

      {% if error %}
        <p class="form-field-error">{{ error }}</p>
      {% endif %}

      <form id="create-service-form" action="{{ url_for('catalog.update_service', serviceId=serviceId) }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2 class="create-job-form-section-header">Service Details</h2>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="service-name">Service Name</label>
            <input id="service-name" name="service_name" type="text" placeholder="Enter service name" value="{{ form_data.service_name|default('', true) }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="service-code">Service Code</label>
            <input id="service-code" name="service_code" type="text" placeholder="Enter service code" value="{{ form_data.service_code|default('', true) }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="service-category">Category</label>
            <input id="service-category" name="category" type="text" placeholder="Enter service category" value="{{ form_data.category|default('', true) }}" required />
          </div>
        </div>

        <div class="add-customer-form-row add-customer-form-row--single">
          <div class="add-customer-form-field">
            <label for="service-description">Description</label>
            <textarea id="service-description" name="description" rows="4" placeholder="Describe the service offering">{{ form_data.description|default('', true) }}</textarea>
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="materials-cost">Materials Cost</label>
            <input id="materials-cost" name="materials_cost" type="number" step="0.01" min="0" placeholder="0.00" value="{{ form_data.materials_cost|default('', true) }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="estimated-hours">Estimated Hours</label>
            <input id="estimated-hours" name="estimated_hours" type="number" step="0.25" min="0" placeholder="0" value="{{ form_data.estimated_hours|default('', true) }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="standard-price">Standard Price</label>
            <input id="standard-price" name="standard_price" type="number" step="0.01" min="0" placeholder="0.00" value="{{ form_data.standard_price|default('', true) }}" required />
          </div>
        </div>

        <div id="create-service-form-actions">
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
