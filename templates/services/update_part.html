{% extends "base.html" %}

{% block title %}Update Part | Steady Work{% endblock %}

{% block content %}
  <div id="main-container">
    <div id="update-part-panel">
      <h1>Update Part</h1>

      <nav id="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ url_for('admin_bp.admin') }}">Admin</a></li>
          <li><a href="{{ url_for('catalog.manage_parts') }}">Manage Parts</a></li>
          <li><a href="{{ url_for('catalog.view_part', partId=partId) }}">View Part</a></li>
          <li aria-current="page">Update Part</li>
        </ol>
      </nav>

      {% if error %}
        <p class="form-field-error">{{ error }}</p>
      {% endif %}

      <form id="create-part-form" action="{{ url_for('catalog.update_part', partId=partId) }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2 class="create-job-form-section-header">Part Details</h2>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="part-name">Part Name</label>
            <input id="part-name" name="part_name" type="text" placeholder="Enter part name" value="{{ form_data.part_name|default('', true) }}" required />
          </div>

          <div class="add-customer-form-field">
            <label for="part-price">Price</label>
            <input id="part-price" name="part_price" type="text" placeholder="$0.00" value="{{ form_data.part_price|default('', true) }}" required />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="product-link">Product Link</label>
            <input id="product-link" name="product_link" type="url" placeholder="https://example.com/product" value="{{ form_data.product_link|default('', true) }}" />
          </div>
        </div>

        <div id="create-service-form-actions">
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
