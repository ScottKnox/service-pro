{% extends "base.html" %}

{% block title %}Add Employee | Steady Work{% endblock %}

{% block content %}
  <div id="main-container">
    <div id="add-customer-panel">
      <h1>Add Employee</h1>

      <nav id="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ url_for('employees') }}">Employees</a></li>
          <li aria-current="page">Add Employee</li>
        </ol>
      </nav>

      <form id="add-customer-form" action="{{ url_for('add_employee') }}" method="post">
        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-first-name">First Name</label>
            <input id="employee-first-name" name="first_name" type="text" placeholder="First name" required />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-last-name">Last Name</label>
            <input id="employee-last-name" name="last_name" type="text" placeholder="Last name" required />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-username">Username</label>
            <input id="employee-username" name="username" type="text" placeholder="Username for login" required />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-password">Password</label>
            <input id="employee-password" name="password" type="password" placeholder="Password for login" required />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-phone">Phone</label>
            <input id="employee-phone" name="phone" type="tel" placeholder="(555) 555-5555" />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-email">Email</label>
            <input id="employee-email" name="email" type="email" placeholder="name@example.com" />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-position">Position</label>
            <input id="employee-position" name="position" type="text" placeholder="Job title or position" />
          </div>

          <div class="add-customer-form-field">
            <label for="employee-status">Status</label>
            <input id="employee-status" name="status" type="text" placeholder="Active, inactive, etc." />
          </div>
        </div>

        <div class="add-customer-form-row">
          <div class="add-customer-form-field">
            <label for="employee-bio">Bio</label>
            <textarea id="employee-bio" name="bio" rows="4" placeholder="Short employee profile bio"></textarea>
          </div>

          <div class="add-customer-form-field"></div>
        </div>

        <div id="add-customer-form-actions">
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
